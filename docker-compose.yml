services:
  # ── PostgreSQL + TimescaleDB ──────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trader}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery Worker ─────────────────────────────────────────
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/app/data
      - ${BACKUP_DIR:-/mnt/backup/trader_bkups}:/backups
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat Scheduler ─────────────────────────────────
  scheduler:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - appdata:/app/data
    command: celery -A app.celery_app beat --loglevel=info --scheduler=app.dynamic_scheduler.DynamicScheduler

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  appdata:
